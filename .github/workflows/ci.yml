name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Rust fmt
        run: cargo fmt --all -- --check

      - name: Rust clippy
        # TODO: add --deny warnings after fixing pre-existing warnings in core.rs
        run: cargo clippy -p porthannis-server

      - name: Run tests
        run: cargo test -p porthannis-server
