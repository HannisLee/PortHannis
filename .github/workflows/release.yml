name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── Windows 构建 (Headless + GUI) ───────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Build headless server
        run: cargo build --release -p porthannis-server

      - name: Package headless
        shell: pwsh
        run: |
          $dist = "dist-headless"
          New-Item -ItemType Directory -Force -Path $dist
          Copy-Item target/release/porthannis.exe $dist/
          Copy-Item packaging/default-config.json $dist/config.json
          Compress-Archive -Path "$dist/*" -DestinationPath porthannis-windows-headless.zip

      - name: Install Tauri CLI
        run: |
          cargo install cargo-binstall -y
          cargo binstall cargo-tauri -y --force

      - name: Build Tauri GUI
        run: cd gui && cargo tauri build

      - name: Package GUI
        shell: pwsh
        run: |
          # Copy the standalone exe from the Tauri build
          Copy-Item gui/target/release/porthannis-gui.exe porthannis-gui-windows.exe
          # Also include the MSI installer if it exists
          $msi = Get-ChildItem -Path "gui/target/release/bundle/msi" -Filter "*.msi" -Recurse | Select-Object -First 1
          if ($msi) {
            Copy-Item $msi.FullName porthannis-gui-windows.msi
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            porthannis-windows-headless.zip
            porthannis-gui-windows.exe
            porthannis-gui-windows.msi

  # ─── Linux 构建 (Headless + GUI) ─────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Build headless server
        run: cargo build --release -p porthannis-server

      - name: Package headless
        run: |
          mkdir -p dist-headless
          cp target/release/porthannis dist-headless/
          cp packaging/default-config.json dist-headless/config.json
          cd dist-headless
          tar czf ../porthannis-linux-headless.tar.gz porthannis config.json

      - name: Install Tauri CLI
        run: |
          cargo install cargo-binstall -y
          cargo binstall cargo-tauri -y --force

      - name: Build Tauri GUI
        run: cd gui && cargo tauri build

      - name: Package GUI
        run: |
          # Find and copy deb
          deb=$(find gui/target/release/bundle/deb -name "*.deb" | head -1)
          if [ -n "$deb" ]; then cp "$deb" porthannis-gui-linux.deb; fi
          # Find and copy AppImage
          appimg=$(find gui/target/release/bundle/appimage -name "*.AppImage" | head -1)
          if [ -n "$appimg" ]; then cp "$appimg" porthannis-gui-linux.AppImage; fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            porthannis-linux-headless.tar.gz
            porthannis-gui-linux.deb
            porthannis-gui-linux.AppImage

  # ─── 创建 Release ────────────────────────────────────────────
  create-release:
    name: Create Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Generate release notes
        run: |
          cat > release-notes.md << 'EOF'
          ## PortHannis ${{ github.ref_name }}

          ### Windows
          - **`porthannis-gui-windows.exe`** — 桌面 GUI 单文件，直接双击运行
          - **`porthannis-gui-windows.msi`** — 桌面 GUI 安装包
          - **`porthannis-windows-headless.zip`** — Headless 服务器 (exe + 配置文件)

          ### Linux
          - **`porthannis-gui-linux.deb`** — 桌面 GUI (Debian/Ubuntu 安装包)
          - **`porthannis-gui-linux.AppImage`** — 桌面 GUI (通用 Linux)
          - **`porthannis-linux-headless.tar.gz`** — Headless 服务器

          ### 使用方式

          **Windows GUI**: 下载 `porthannis-gui-windows.exe` 双击运行，或安装 `.msi`

          **Linux GUI**:
          ```
          sudo dpkg -i porthannis-gui-linux.deb
          # 或
          chmod +x porthannis-gui-linux.AppImage && ./porthannis-gui-linux.AppImage
          ```

          **Headless (无 GUI 服务器)**:
          ```
          # Windows
          解压 porthannis-windows-headless.zip
          .\porthannis.exe -b 0.0.0.0 -P 25879

          # Linux
          tar xzf porthannis-linux-headless.tar.gz
          ./porthannis -b 0.0.0.0 -P 25879
          ```
          浏览器打开 http://localhost:25879
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            windows-artifacts/porthannis-windows-headless.zip
            windows-artifacts/porthannis-gui-windows.exe
            windows-artifacts/porthannis-gui-windows.msi
            linux-artifacts/porthannis-linux-headless.tar.gz
            linux-artifacts/porthannis-gui-linux.deb
            linux-artifacts/porthannis-gui-linux.AppImage
