<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PortHannis — 端口转发管理器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f172a;--surface:#1e293b;--surface2:#334155;--border:#475569;--text:#e2e8f0;--text2:#94a3b8;--accent:#3b82f6;--accent-hover:#2563eb;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--radius:8px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:20px;font-weight:600;display:flex;align-items:center;gap:8px}
.header h1 span{color:var(--accent)}
.container{max-width:960px;margin:0 auto;padding:24px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
.stat-value{font-size:28px;font-weight:700}
.stat-label{font-size:12px;color:var(--text2);margin-top:4px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:none;border-radius:6px;font-size:14px;cursor:pointer;font-weight:500;transition:all .15s}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover:not(:disabled){background:var(--accent-hover)}
.btn-success{background:var(--green);color:#fff}.btn-success:hover:not(:disabled){opacity:.9}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover:not(:disabled){opacity:.9}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}.btn-ghost:hover:not(:disabled){background:var(--surface2);color:var(--text)}
.btn-sm{padding:4px 10px;font-size:12px}
table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--border);font-size:14px}
th{color:var(--text2);font-weight:500;font-size:12px;text-transform:uppercase;letter-spacing:.5px}
tr:hover td{background:rgba(59,130,246,.05)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:99px;font-size:12px;font-weight:500}
.badge-running{background:rgba(34,197,94,.15);color:var(--green)}
.badge-running::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
.badge-stopped{background:rgba(148,163,184,.15);color:var(--text2)}
.actions{display:flex;gap:6px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;width:420px;max-width:90vw}
.modal h2{font-size:18px;margin-bottom:16px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:13px;color:var(--text2);margin-bottom:4px}
.form-group input{width:100%;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px}
.form-group input:focus{outline:none;border-color:var(--accent)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.empty{text-align:center;padding:40px 20px;color:var(--text2)}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:.5}
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:8px;font-size:14px;z-index:200;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.toast-success{background:var(--green);color:#fff}
.toast-error{background:var(--red);color:#fff}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>
<div class="header">
  <h1>&#9889; <span>Port</span>Hannis</h1>
  <button class="btn btn-primary" id="btn-add">&#43; 新增转发</button>
</div>
<div class="container">
  <div class="stats">
    <div class="stat"><div class="stat-value" id="stat-total">0</div><div class="stat-label">总条目</div></div>
    <div class="stat"><div class="stat-value" style="color:var(--green)" id="stat-running">0</div><div class="stat-label">运行中</div></div>
    <div class="stat"><div class="stat-value" style="color:var(--text2)" id="stat-stopped">0</div><div class="stat-label">已停止</div></div>
  </div>
  <div class="card">
    <div id="entry-list"></div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal-title">新增转发</h2>
    <input type="hidden" id="edit-id">
    <div class="form-group">
      <label>名称</label>
      <input type="text" id="f-name" placeholder="例如: MySQL 转发">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>监听地址</label>
        <input type="text" id="f-saddr" value="0.0.0.0">
      </div>
      <div class="form-group">
        <label>监听端口</label>
        <input type="number" id="f-sport" placeholder="8080">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>目标地址</label>
        <input type="text" id="f-taddr" placeholder="192.168.1.100">
      </div>
      <div class="form-group">
        <label>目标端口</label>
        <input type="number" id="f-tport" placeholder="80">
      </div>
    </div>
    <div class="form-group" style="display:flex;align-items:center;gap:8px;margin-top:4px">
      <input type="checkbox" id="f-enabled" checked style="width:auto">
      <label for="f-enabled" style="margin:0">创建后自动启动</label>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="btn-cancel">取消</button>
      <button class="btn btn-primary" id="btn-save">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '/api';
let entries = [];
let loading = false;
let toastTimer = null;

async function api(path, opts) {
  const res = await fetch(API + path, {
    headers: {'Content-Type': 'application/json'},
    ...opts
  });
  if (!res.ok) {
    const data = await res.json().catch(() => ({}));
    throw new Error(data.error || res.statusText);
  }
  if (res.status === 204) return null;
  return res.json();
}

function toast(msg, type) {
  type = type || 'success';
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast toast-' + type + ' show';
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.remove('show'); }, 3000);
}

async function loadEntries() {
  if (loading) return;
  loading = true;
  try {
    entries = await api('/entries');
    render();
  } catch(e) {
    toast('加载失败: ' + e.message, 'error');
  }
  loading = false;
}

function render() {
  var running = 0;
  for (var i = 0; i < entries.length; i++) { if (entries[i]._running) running++; }
  document.getElementById('stat-total').textContent = entries.length;
  document.getElementById('stat-running').textContent = running;
  document.getElementById('stat-stopped').textContent = entries.length - running;

  var list = document.getElementById('entry-list');
  if (!entries.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">&#128268;</div><div>暂无转发条目</div><div style="margin-top:8px;font-size:13px">点击右上角「新增转发」开始</div></div>';
    return;
  }

  var html = '<table><thead><tr><th>名称</th><th>监听</th><th>目标</th><th>状态</th><th>操作</th></tr></thead><tbody>';
  for (var i = 0; i < entries.length; i++) {
    var e = entries[i];
    var badge = e._running
      ? '<span class="badge badge-running">运行中</span>'
      : '<span class="badge badge-stopped">已停止</span>';
    var toggleBtn = e._running
      ? '<button class="btn btn-sm btn-danger" data-action="stop" data-id="' + e.id + '">停止</button>'
      : '<button class="btn btn-sm btn-success" data-action="start" data-id="' + e.id + '">启动</button>';
    html += '<tr>'
      + '<td>' + esc(e.name) + '</td>'
      + '<td><code>' + esc(e.source_address) + ':' + e.source_port + '</code></td>'
      + '<td><code>' + esc(e.target_address) + ':' + e.target_port + '</code></td>'
      + '<td>' + badge + '</td>'
      + '<td class="actions">' + toggleBtn
      + '<button class="btn btn-sm btn-ghost" data-action="edit" data-id="' + e.id + '">编辑</button>'
      + '<button class="btn btn-sm btn-ghost" data-action="delete" data-id="' + e.id + '">删除</button>'
      + '</td></tr>';
  }
  html += '</tbody></table>';
  list.innerHTML = html;
}

function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function openModal(entry) {
  document.getElementById('modal').classList.add('active');
  if (entry) {
    document.getElementById('modal-title').textContent = '编辑转发';
    document.getElementById('edit-id').value = entry.id;
    document.getElementById('f-name').value = entry.name;
    document.getElementById('f-saddr').value = entry.source_address;
    document.getElementById('f-sport').value = entry.source_port;
    document.getElementById('f-taddr').value = entry.target_address;
    document.getElementById('f-tport').value = entry.target_port;
    document.getElementById('f-enabled').checked = entry.enabled;
  } else {
    document.getElementById('modal-title').textContent = '新增转发';
    document.getElementById('edit-id').value = '';
    document.getElementById('f-name').value = '';
    document.getElementById('f-saddr').value = '0.0.0.0';
    document.getElementById('f-sport').value = '';
    document.getElementById('f-taddr').value = '';
    document.getElementById('f-tport').value = '';
    document.getElementById('f-enabled').checked = true;
  }
  document.getElementById('f-name').focus();
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
}

async function saveEntry() {
  var id = document.getElementById('edit-id').value;
  var body = {
    name: document.getElementById('f-name').value.trim(),
    source_address: document.getElementById('f-saddr').value.trim() || '0.0.0.0',
    source_port: parseInt(document.getElementById('f-sport').value),
    target_address: document.getElementById('f-taddr').value.trim(),
    target_port: parseInt(document.getElementById('f-tport').value),
    enabled: document.getElementById('f-enabled').checked
  };
  if (!body.name) return toast('请输入名称', 'error');
  if (!body.source_port || !body.target_port) return toast('请输入端口', 'error');
  if (!body.target_address) return toast('请输入目标地址', 'error');

  var btn = document.getElementById('btn-save');
  btn.disabled = true;
  btn.textContent = '保存中...';
  try {
    if (id) {
      await api('/entries/' + id, { method: 'PUT', body: JSON.stringify(body) });
      toast('已更新');
    } else {
      var entry = await api('/entries', { method: 'POST', body: JSON.stringify(body) });
      if (body.enabled && entry && entry.id) {
        try { await api('/entries/' + entry.id + '/start', { method: 'POST' }); } catch(err) {}
      }
      toast('已创建');
    }
    closeModal();
    await loadEntries();
  } catch(e) {
    toast('操作失败: ' + e.message, 'error');
  }
  btn.disabled = false;
  btn.textContent = '保存';
}

function editEntry(id) {
  var e = null;
  for (var i = 0; i < entries.length; i++) {
    if (entries[i].id === id) { e = entries[i]; break; }
  }
  if (e) openModal(e);
}

async function deleteEntry(id) {
  if (!confirm('确定删除此条目？')) return;
  try {
    var e = null;
    for (var i = 0; i < entries.length; i++) {
      if (entries[i].id === id) { e = entries[i]; break; }
    }
    if (e && e._running) {
      await api('/entries/' + id + '/stop', { method: 'POST' });
    }
    await api('/entries/' + id, { method: 'DELETE' });
    toast('已删除');
    await loadEntries();
  } catch(e) {
    toast('删除失败: ' + e.message, 'error');
  }
}

async function toggleEntry(id, start) {
  try {
    await api('/entries/' + id + '/' + (start ? 'start' : 'stop'), { method: 'POST' });
    toast(start ? '已启动' : '已停止');
    await loadEntries();
  } catch(e) {
    toast('操作失败: ' + e.message, 'error');
  }
}

// 事件委托：所有按钮通过 data-action 统一处理
document.getElementById('entry-list').addEventListener('click', function(ev) {
  var btn = ev.target.closest('[data-action]');
  if (!btn || btn.disabled) return;
  var action = btn.getAttribute('data-action');
  var id = btn.getAttribute('data-id');
  if (action === 'start') { btn.disabled = true; toggleEntry(id, true); }
  else if (action === 'stop') { btn.disabled = true; toggleEntry(id, false); }
  else if (action === 'edit') { editEntry(id); }
  else if (action === 'delete') { deleteEntry(id); }
});

document.getElementById('btn-add').addEventListener('click', function() { openModal(); });
document.getElementById('btn-cancel').addEventListener('click', closeModal);
document.getElementById('btn-save').addEventListener('click', saveEntry);
document.getElementById('modal').addEventListener('click', function(ev) {
  if (ev.target === this) closeModal();
});
document.addEventListener('keydown', function(ev) {
  if (ev.key === 'Escape') closeModal();
});

loadEntries();
setInterval(loadEntries, 5000);
</script>
</body>
</html>
